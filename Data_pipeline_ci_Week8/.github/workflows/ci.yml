name: Data Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Spin up Postgres directly in GitHub's test environment
      postgres_warehouse:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pipeline_user
          POSTGRES_PASSWORD: "12345"
          POSTGRES_DB: warehouse
        ports:
          - 5432:5432
        # Ensure Postgres is fully responsive before starting the runner steps
        options: >-
          --health-cmd "pg_isready -U pipeline_user -d warehouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed Mock Data Matrix
        env:
          PGPASSWORD: "12345"
        run: |
          psql -h localhost -U pipeline_user -d warehouse -c "
          CREATE TABLE IF NOT EXISTS public.orders (
              id INT, 
              customer_id INT, 
              status VARCHAR(50), 
              total_amount NUMERIC, 
              created_at TIMESTAMP
          );
          INSERT INTO public.orders VALUES (1, 100, 'completed', 150.50, NOW());
          INSERT INTO public.orders VALUES (2, 101, 'placed', 45.00, NOW());
          "

      - name: Verify dbt Connection
        run: dbt debug --project-dir dbt_project --profiles-dir dbt_project

      - name: Execute dbt Models
        run: dbt run --project-dir dbt_project --profiles-dir dbt_project

      - name: Run Data Tests
        run: dbt test --project-dir dbt_project --profiles-dir dbt_project