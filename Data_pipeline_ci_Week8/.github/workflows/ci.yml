# The name of the automation workflow
name: My First GitHub Action

# This specifies the event that triggers the workflow
on:
  push:
    branches: [ "main" ]

# A workflow is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-test:
    # The type of virtual machine environment the job will run on
    runs-on: ubuntu-latest

    # The sequence of tasks (steps) to execute
    steps:
      # Step 1: Standard action to check out (download) your repo code onto the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Run a simple echo command in the terminal
      - name: Run a one-line script
        run: echo "Hello, GitHub Actions is working seamlessly!"

      # Step 3: Run multiple commands
      - name: Run multi-line scripts
        run: |
          echo "Running dependency checks..."
          node --version