name: Week8 Task-- complete docker setup and github actions pipeline

on:
  push:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: Data_pipeline_ci_Week8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dbt debug
        run: |
          dbt debug --project-dir dbt_project --profiles-dir dbt_project